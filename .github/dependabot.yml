version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:00'
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:30'
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
