name: CI

on:
  workflow_call:
  push:
    branches:
      - main
      - '**'
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  BUN_VERSION: 1.3.12

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then bun install --frozen-lockfile; elif [ -f package.json ]; then bun install; else echo 'package.json not present yet; CI bootstrap only'; fi
      - name: Run typecheck
        run: |
          if [ -f package.json ]; then bun run typecheck; else echo 'package.json not present yet; skipping until scaffold lands'; fi

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then bun install --frozen-lockfile; elif [ -f package.json ]; then bun install; else echo 'package.json not present yet; CI bootstrap only'; fi
      - name: Run lint
        run: |
          if [ -f package.json ]; then bun run lint; else echo 'package.json not present yet; skipping until scaffold lands'; fi

  test-unit:
    name: test:unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then bun install --frozen-lockfile; elif [ -f package.json ]; then bun install; else echo 'package.json not present yet; CI bootstrap only'; fi
      - name: Run unit tests
        run: |
          if [ -f package.json ] && [ -f vitest.config.ts ]; then bun run test:unit -- --coverage; else echo 'vitest.config not yet; skipping until T2 test harness lands'; fi
      - name: Upload coverage
        if: hashFiles('coverage/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  test-i18n:
    name: test:i18n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then bun install --frozen-lockfile; elif [ -f package.json ]; then bun install; else echo 'package.json not present yet; CI bootstrap only'; fi
      - name: Run i18n coverage
        run: |
          if [ -f package.json ]; then bun run test:i18n-coverage; else echo 'package.json not present yet; skipping until scaffold lands'; fi

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then bun install --frozen-lockfile; elif [ -f package.json ]; then bun install; else echo 'package.json not present yet; CI bootstrap only'; fi
      - name: Build
        run: |
          if [ -f package.json ]; then bun run build; else mkdir -p dist && printf 'CI bootstrap placeholder\n' > dist/.ci-bootstrap; fi
      - name: Verify prerender output
        run: |
          if [ -f package.json ] && [ -f scripts/verify-prerender.ts ]; then bun run verify:prerender; else echo 'prerender verifier not present yet; skipping'; fi
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error

  test-e2e:
    name: test:e2e
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then bun install --frozen-lockfile; elif [ -f package.json ]; then bun install; else echo 'package.json not present yet; CI bootstrap only'; fi
      - name: Install Playwright browsers
        run: |
          if [ -f playwright.config.ts ]; then bunx playwright install --with-deps chromium; else echo 'no playwright config yet; skipping'; fi
      - name: Run E2E tests
        continue-on-error: true
        run: |
          if [ -f package.json ] && [ -f playwright.config.ts ]; then bun run test:e2e -- --project=chromium; else echo 'playwright.config not yet; skipping until T2 test harness lands'; fi

  test-lhci:
    name: test:lhci
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then bun install --frozen-lockfile; elif [ -f package.json ]; then bun install; else echo 'package.json not present yet; CI bootstrap only'; fi
      - name: Run Lighthouse CI
        continue-on-error: true
        run: |
          if [ -f package.json ] && [ -f lighthouserc.json ]; then bun run test:lhci; else echo 'no lhci config yet; skipping until T2 test harness lands'; fi

  test-budget:
    name: test:budget
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then bun install --frozen-lockfile; elif [ -f package.json ]; then bun install; else echo 'package.json not present yet; CI bootstrap only'; fi
      - name: Run bundle budget
        continue-on-error: true
        run: |
          if [ -f package.json ] && [ -f .size-limit.json ]; then bun run test:budget; else echo 'size-limit.json not yet; skipping until T2 test harness lands'; fi

  test-a11y:
    name: test:a11y
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then bun install --frozen-lockfile; elif [ -f package.json ]; then bun install; else echo 'package.json not present yet; CI bootstrap only'; fi
      - name: Install Playwright browsers
        run: |
          if [ -f playwright.config.ts ]; then bunx playwright install --with-deps chromium; else echo 'no playwright config yet; skipping'; fi
      - name: Run accessibility tests
        continue-on-error: true
        run: |
          if [ -f package.json ] && find tests/a11y -name '*.a11y.spec.ts' 2>/dev/null | head -1 | grep -q .; then bun run test:a11y; else echo 'no a11y specs yet; skipping until T2 test harness lands'; fi

  analyze:
    name: analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

  size-limit:
    name: size-limit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then bun install --frozen-lockfile; elif [ -f package.json ]; then bun install; else echo 'package.json not present yet; skipping'; fi
      - name: Run size-limit
        continue-on-error: true
        if: hashFiles('.size-limit.json') != ''
        run: bun run test:budget
